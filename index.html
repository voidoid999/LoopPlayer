<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoopPlayer - A/B Audio Looping Tool</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="app">
        <h1>LoopPlayer</h1>

        <div class="card">

            <label class="file-picker">
                <span>Select Audio File</span>
                <input
                    type="file"
                    id="audioFile"
                    accept=".mp3,.wav,.m4a,.flac,audio/*"
                />
            </label>

            <div class="controls">
                <button id="playBtn">Play</button>
                <button id="pauseBtn">Pause</button>
            </div>

            <div class="time-row">
                <span id="currentTime">00:00</span>
                <span>/</span>
                <span id="duration">00:00</span>
            </div>

            <!-- Waveform -->
            <div class="waveform-container">
                <canvas
                    id="waveformCanvas"
                    width="1000"
                    height="140">
                </canvas>
            </div>

            <!-- Seek -->
            <div class="seek-container">
                <input
                    type="range"
                    id="seekSlider"
                    min="0"
                    max="100"
                    value="0"
                />
            </div>

            <!-- Loop Controls -->
            <div class="loop-controls">
                <button id="setABtn">Set A</button>
                <button id="setBBtn">Set B</button>
                <button id="clearLoopBtn">Clear Loop</button>
            </div>

            <!-- Loop Times -->
            <div class="loop-info">
                <div>
                    <strong>A:</strong>
                    <span id="aTime">Not Set</span>
                </div>

                <div>
                    <strong>B:</strong>
                    <span id="bTime">Not Set</span>
                </div>
            </div>

            <!-- Playback Speed -->
            <div class="speed-control">
                <label>Playback Speed</label>
                <div id="speedButtons" class="speed-buttons"></div>
            </div>

            <!-- Volume -->
            <div class="volume-control">
                <label for="volumeSlider">
                    Volume
                    <span id="volumeValue">100%</span>
                </label>

                <input
                    type="range"
                    id="volumeSlider"
                    min="0"
                    max="100"
                    value="100"
                />
            </div>

        </div>

        <footer>
            LoopPlayer • Local Audio A/B Looper
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
